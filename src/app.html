<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="The easiest way to get started with bitcoin" />
    <meta name="keywords" content="open source bitcoin lightning web wallet" />
    <meta name="theme-color" content="#fff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/images/icon-160.png" />
    <link rel="preload" href="/fonts/Public_Sans/static/PublicSans-Regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="manifest" href="/manifest.webmanifest" />
    %sveltekit.head%
    <script>
      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        window.__installPrompt = e;
      });
    </script>
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
